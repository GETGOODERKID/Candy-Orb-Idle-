<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candy Orb Idle</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="config.js" defer></script>
  <script src="state.js" defer></script>
  <script src="data.js" defer></script>
  <script src="economy.js" defer></script>
  <script src="effects.js" defer></script>
  <script src="ui.js" defer></script>
  <script src="save.js" defer></script>
  <script src="main.js" defer></script>
</head>
<body>
  <div id="rainContainer"></div>

  <div id="game">
    <div id="left">
      <div id="topbar">
        <div id="prestigeBadge" title="Prestige points are permanent and give +10% production per level">
          ★ <span id="prestigeTop">0</span>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="shop">Shop</button>
          <button class="tab" data-tab="upgrades">Upgrades</button>
          <button class="tab" data-tab="stats">Stats</button>
          <button class="tab" data-tab="prestige">Prestige</button>
          <button class="tab" data-tab="achievements">Achievements</button>
          <button class="tab" data-tab="settings">Settings</button>
        </div>
      </div>

      <div id="shop" class="panel active"></div>
      <div id="upgrades" class="panel"></div>
      <div id="stats" class="panel"></div>
      <div id="prestige" class="panel"></div>
      <div id="achievements" class="panel"></div>
      <div id="settings" class="panel"></div>
    </div>

    <div id="right">
      <h1>Candy Orb</h1>
      <img id="orbImg" class="orb" src="orb.png.png" alt="Candy Orb" onerror="this.style.display='none'">
      <svg id="orbFallback" class="orb" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <defs>
          <radialGradient id="orbGradient" cx="40%" cy="40%">
            <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
            <stop offset="60%" style="stop-color:#a78bfa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
          </radialGradient>
          <filter id="orbGlow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle cx="100" cy="100" r="95" fill="url(#orbGradient)" filter="url(#orbGlow)" />
        <circle cx="75" cy="75" r="30" fill="rgba(255,255,255,0.25)" />
      </svg>

      <div class="stats">
        <div class="stat-row">
          <span class="stat-label">Candy Orbs:</span>
          <span class="stat-value" id="candyOrbs">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Candy/sec:</span>
          <span class="stat-value" id="cps">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Click Power:</span>
          <span class="stat-value" id="clickPower">1</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Crit Chance:</span>
          <span class="stat-value" id="critChance">10%</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Hot Streak:</span>
          <span class="stat-value" id="hotStreak">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Prestige Level:</span>
          <span class="stat-value" id="prestigeLevel">0</span>
        </div>
      </div>

      <div id="msg" style="margin:0;padding:8px 12px;"></div>

      <div class="legend">
        Click the orb to gain candy. Buy buildings for passive income. Each achievement boosts all buildings by 5%. Prestige at 100,000 earned to gain permanent points.
      </div>
    </div>
  </div>
</body>
</html>
